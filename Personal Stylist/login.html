<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Groww Stylist</title>
  <link rel="icon" type="image/jpeg" href="images/growwstylist_logo.jpg">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            coral: '#FF6F61',
            'dark-gray': '#333333',
            'light-peach': '#FFDAB9',
            white: '#FFFFFF'
          }
        }
      }
    }
  </script>
  <style>
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in {
      animation: fadeInUp 0.8s ease-out;
    }
    
    /* Custom Navbar Background Color */
    .navbar-custom {
      background-color: #333333; /* dark-gray */
      border-bottom: 1px solid rgba(255, 111, 97, 0.2); /* coral/20 */
    }

    /* RTL Support */
    [dir="rtl"] .animated-circle-left {
      left: auto;
      right: 2.5rem;
    }

    [dir="rtl"] .animated-circle-right {
      right: auto;
      left: 2.5rem;
    }

    /* Ensure no horizontal scroll */
    html, body {
      overflow-x: hidden;
      width: 100%;
    }
  </style>
</head>
<body class="font-sans antialiased bg-gradient-to-br from-light-peach/20 via-white to-gray-100 dark:from-[#222222] dark:via-[#1a1a1a] dark:to-[#222222] h-screen overflow-hidden flex flex-col transition-colors duration-300">

  <nav class="navbar-custom backdrop-blur-md z-50 flex-shrink-0">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-20">

        <div class="flex items-center">
          <a href="index.html" class="hover:opacity-80 transition-opacity">
            <h1 class="text-2xl font-bold text-white">
              Groww <span class="text-coral">Stylist</span>
            </h1>
          </a>
        </div>

        <div class="flex items-center space-x-2">
          <button id="rtl-toggle" class="w-10 h-10 rounded-full bg-white/10 hover:bg-white/20 flex items-center justify-center text-white transition duration-300 ml-2 text-xs font-semibold" title="Toggle RTL">
            RTL
          </button>

          <button id="theme-toggle" class="w-10 h-10 rounded-full bg-white/10 hover:bg-white/20 flex items-center justify-center text-white transition duration-300 ml-2" title="Toggle Theme">
            <i class="fas fa-moon dark:hidden text-sm"></i>
            <i class="fas fa-sun hidden dark:inline text-sm"></i>
          </button>
        </div>

      </div>
    </div>
  </nav>

  <div class="animated-circle-left absolute top-20 ltr:left-10 rtl:right-10 w-72 h-72 bg-coral/10 rounded-full blur-3xl animate-pulse pointer-events-none"></div>
  <div class="animated-circle-right absolute bottom-20 ltr:right-10 rtl:left-10 w-96 h-96 bg-coral/5 rounded-full blur-3xl animate-pulse pointer-events-none" style="animation-delay: 1.5s;"></div>

  <div class="flex-1 overflow-y-auto flex items-center justify-center p-4">
    
    <div class="w-full max-w-md bg-white dark:bg-dark-gray rounded-3xl shadow-2xl p-6 lg:p-8 border border-gray-100 dark:border-gray-800 relative z-10 animate-fade-in">

        <div class="text-center mb-6">
          <div class="w-16 h-16 bg-light-peach/30 dark:bg-coral/10 rounded-full flex items-center justify-center mx-auto mb-4">
            <i class="fas fa-user text-coral text-2xl"></i>
          </div>
          <h2 class="text-3xl font-bold text-dark-gray dark:text-white mb-2">Welcome Back</h2>
          <p class="text-gray-600 dark:text-gray-400">Sign in to access your style profile</p>
        </div>

        <form class="space-y-5" onsubmit="handleLogin(event)">

          <div>
              <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">
                <i class="fas fa-envelope ltr:mr-2 rtl:ml-2 text-coral"></i>Email Address
              </label>
              <input 
                type="email" 
                required
                placeholder="your.email@example.com"
                class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-[#222222] dark:text-white focus:border-coral focus:ring-4 focus:ring-coral/20 outline-none transition-all"
              />
          </div>

          <div>
              <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">
                <i class="fas fa-lock ltr:mr-2 rtl:ml-2 text-coral"></i>Password
              </label>
              <div class="relative">
                <input 
                    type="password" 
                    id="password"
                    required
                    placeholder="Enter your password"
                    class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-[#222222] dark:text-white focus:border-coral focus:ring-4 focus:ring-coral/20 outline-none transition-all"
                />
                <button 
                    type="button" 
                    onclick="togglePassword()"
                    class="absolute ltr:right-4 rtl:left-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-coral transition-colors"
                >
                    <i class="fas fa-eye" id="toggleIcon"></i>
                </button>
              </div>
          </div>

          <div class="flex items-center justify-between text-sm">
              <label class="flex items-center cursor-pointer">
                <input type="checkbox" class="w-4 h-4 rounded border-gray-300 text-coral focus:ring-coral focus:ring-2">
                <span class="ltr:ml-2 rtl:mr-2 text-gray-600 dark:text-gray-400 font-medium">Remember me</span>
              </label>
              <span class="text-coral font-semibold cursor-pointer hover:text-[#e85b4d] transition-colors">
                Forgot password?
              </span>
          </div>

          <button 
              type="submit"
              class="w-full py-3.5 mt-2 bg-coral hover:bg-[#e85b4d] text-white font-bold rounded-xl shadow-lg hover:shadow-coral/50 transform hover:-translate-y-1 transition-all duration-300 flex items-center justify-center"
          >
              <i class="fas fa-sign-in-alt ltr:mr-2 rtl:ml-2"></i> <span>Sign In</span>
          </button>

          <div class="relative my-6">
              <div class="absolute inset-0 flex items-center">
                <div class="w-full border-t border-gray-200 dark:border-gray-700"></div>
              </div>
              <div class="relative flex justify-center text-sm">
                <span class="px-4 bg-white dark:bg-dark-gray text-gray-500 dark:text-gray-400">Or continue with</span>
              </div>
          </div>

          <div class="grid grid-cols-2 gap-3">
              <button 
                type="button"
                class="flex items-center justify-center px-4 py-2.5 border-2 border-gray-200 dark:border-gray-700 rounded-xl hover:bg-gray-50 dark:hover:bg-[#222222] transition-all"
              >
                <svg class="w-5 h-5 ltr:mr-2 rtl:ml-2" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                <span class="text-sm font-semibold text-gray-700 dark:text-gray-300">Google</span>
              </button>

              <button 
                type="button"
                class="flex items-center justify-center px-4 py-2.5 border-2 border-gray-200 dark:border-gray-700 rounded-xl hover:bg-gray-50 dark:hover:bg-[#222222] transition-all"
              >
                <i class="fab fa-facebook text-blue-600 text-xl ltr:mr-2 rtl:ml-2"></i>
                <span class="text-sm font-semibold text-gray-700 dark:text-gray-300">Facebook</span>
              </button>
          </div>

        </form>

        <div class="mt-8 text-center text-sm text-gray-600 dark:text-gray-400">
          Don't have an account? 
          <a href="register.html" class="text-coral font-bold hover:underline transition-colors ltr:ml-1 rtl:mr-1">
              Sign Up Here
          </a>
        </div>

    </div>
  </div>

  <script>
    // Toggle Password Visibility
    function togglePassword() {
      const passwordInput = document.getElementById('password');
      const toggleIcon = document.getElementById('toggleIcon');

      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        toggleIcon.classList.remove('fa-eye');
        toggleIcon.classList.add('fa-eye-slash');
      } else {
        passwordInput.type = 'password';
        toggleIcon.classList.remove('fa-eye-slash');
        toggleIcon.classList.add('fa-eye');
      }
    }

    // Handle Login Submit (Simulation)
    function handleLogin(event) {
      event.preventDefault();

      const button = event.target.querySelector('button[type="submit"]');
      const icon = button.querySelector('i');
      const span = button.querySelector('span');
      
      icon.className = 'fas fa-spinner fa-spin ltr:mr-2 rtl:ml-2';
      span.innerText = 'Signing In...';
      button.disabled = true;
      button.classList.add('opacity-80', 'cursor-not-allowed');

      // Simulate API call, then redirect
      setTimeout(() => {
        window.location.href = 'user-dashboard.html';
      }, 1500);
    }

    // Theme Toggle Function
    const themeToggle = document.getElementById('theme-toggle');
    const html = document.documentElement;

    function toggleTheme() {
      if (html.classList.contains('dark')) {
        html.classList.remove('dark');
        localStorage.setItem('theme', 'light');
      } else {
        html.classList.add('dark');
        localStorage.setItem('theme', 'dark');
      }
    }

    if (themeToggle) themeToggle.addEventListener('click', toggleTheme);
    if (localStorage.getItem('theme') === 'dark') html.classList.add('dark');

    // RTL Toggle Function
    const rtlToggle = document.getElementById('rtl-toggle');

    function toggleRTL() {
      if (html.getAttribute('dir') === 'rtl') {
        html.removeAttribute('dir');
        localStorage.setItem('direction', 'ltr');
      } else {
        html.setAttribute('dir', 'rtl');
        localStorage.setItem('direction', 'rtl');
      }
    }

    if (rtlToggle) rtlToggle.addEventListener('click', toggleRTL);
    if (localStorage.getItem('direction') === 'rtl') html.setAttribute('dir', 'rtl');
  </script>

</body>
</html>
