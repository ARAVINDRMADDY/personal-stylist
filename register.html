<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Groww Stylist</title>
  <link rel="icon" type="image/jpeg" href="images/growwpark_logo.jpg">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            'theme-gold': '#A68A5B',      
            'theme-gold-dark': '#8c734b', 
            'dark-gray': '#1a1a1a',       
            'light-peach': '#F5F0EB',     
            white: '#FFFFFF'
          },
          fontFamily: {
            serif: ['"Playfair Display"', 'serif'],
            sans: ['"Lato"', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <style>
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in {
      animation: fadeInUp 0.8s ease-out;
    }
    
    /* Subtle pulsing glow for the background elements */
    @keyframes pulse-slow {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(1.05); }
    }
    .animate-pulse-slow { animation: pulse-slow 6s ease-in-out infinite; }
  </style>
</head>
<body class="font-sans antialiased text-gray-800 dark:text-white h-screen overflow-hidden flex flex-col relative bg-gray-50 dark:bg-[#121212] transition-colors duration-300">

  <div class="absolute inset-0 overflow-hidden z-0">
    <div class="absolute top-[-10%] left-[-10%] w-[50vw] h-[50vw] bg-theme-gold/20 dark:bg-theme-gold/10 rounded-full blur-[120px] pointer-events-none animate-pulse-slow"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[40vw] h-[40vw] bg-theme-gold/10 dark:bg-theme-gold/5 rounded-full blur-[100px] pointer-events-none animate-pulse-slow" style="animation-delay: 3s;"></div>
    <div class="absolute inset-0 bg-gradient-to-b from-transparent via-gray-50/50 dark:via-[#121212]/50 to-gray-50 dark:to-[#121212]"></div>
  </div>

  <nav class="absolute top-0 w-full z-50 p-6">
    <div class="max-w-7xl mx-auto flex items-center justify-between">
      <a href="index.html" class="flex items-center space-x-2">
        <span class="text-2xl font-serif font-bold text-dark-gray dark:text-white tracking-wide transition-colors">
          Personal <span class="text-theme-gold italic">Stylist</span>
        </span>
      </a>

      <div class="flex items-center gap-4">
        <button id="rtl-toggle" class="w-8 h-8 rounded-full bg-black/5 dark:bg-white/5 hover:bg-black/10 dark:hover:bg-white/10 border border-black/10 dark:border-white/10 flex items-center justify-center text-dark-gray dark:text-white transition-all text-[10px] font-bold tracking-wider" title="Toggle RTL">
          RTL
        </button>

        <button id="theme-toggle" class="w-8 h-8 rounded-full bg-black/5 dark:bg-white/5 hover:bg-black/10 dark:hover:bg-white/10 border border-black/10 dark:border-white/10 flex items-center justify-center text-dark-gray dark:text-white transition-all" title="Toggle Theme">
          <i class="fas fa-moon dark:hidden text-xs"></i>
          <i class="fas fa-sun hidden dark:inline text-xs"></i>
        </button>
      </div>
    </div>
  </nav>

  <div class="flex-1 flex items-center justify-center p-4 relative z-10 mt-12">
    
    <div class="w-full max-w-md bg-white dark:bg-[#1a1a1a] border border-gray-200 dark:border-white/10 shadow-2xl p-8 border-t-4 border-t-theme-gold animate-fade-in relative overflow-hidden transition-colors duration-300">
        
        <div class="absolute top-0 right-0 w-32 h-32 bg-theme-gold/10 dark:bg-theme-gold/5 rounded-full blur-2xl -mr-10 -mt-10 pointer-events-none"></div>

        <div class="text-center mb-6 relative z-10">
          <div class="w-12 h-12 bg-theme-gold/10 rounded-full flex items-center justify-center mx-auto mb-3 border border-theme-gold/20">
            <i class="fas fa-user-plus text-theme-gold text-xl"></i>
          </div>
          <h2 class="text-2xl font-serif font-bold text-dark-gray dark:text-white mb-1 transition-colors">Create Account</h2>
          <p class="text-gray-500 dark:text-gray-400 text-xs font-light tracking-wide transition-colors">Enter your details to start your style journey.</p>
        </div>

        <form class="space-y-4 relative z-10" onsubmit="handleRegister(event)">

          <div class="group">
              <label class="block text-[10px] font-bold text-gray-500 dark:text-gray-400 uppercase tracking-widest mb-1 transition-colors group-focus-within:text-theme-gold dark:group-focus-within:text-theme-gold">
                Full Name
              </label>
              <div class="relative">
                <div class="absolute inset-y-0 left-0 rtl:left-auto rtl:right-0 pl-3 rtl:pl-0 rtl:pr-3 flex items-center pointer-events-none">
                  <i class="far fa-user text-gray-400 dark:text-gray-500 group-focus-within:text-theme-gold dark:group-focus-within:text-theme-gold transition-colors"></i>
                </div>
                <input 
                  type="text" 
                  required
                  placeholder="John Doe"
                  class="w-full pl-10 rtl:pl-4 pr-4 rtl:pr-10 py-2.5 bg-gray-50 dark:bg-[#222] border border-gray-200 dark:border-gray-700 rounded-none text-dark-gray dark:text-white focus:outline-none focus:border-theme-gold focus:ring-1 focus:ring-theme-gold transition-all placeholder-gray-400 dark:placeholder-gray-600 text-sm"
                />
              </div>
          </div>

          <div class="group">
              <label class="block text-[10px] font-bold text-gray-500 dark:text-gray-400 uppercase tracking-widest mb-1 transition-colors group-focus-within:text-theme-gold dark:group-focus-within:text-theme-gold">
                Email Address
              </label>
              <div class="relative">
                <div class="absolute inset-y-0 left-0 rtl:left-auto rtl:right-0 pl-3 rtl:pl-0 rtl:pr-3 flex items-center pointer-events-none">
                  <i class="far fa-envelope text-gray-400 dark:text-gray-500 group-focus-within:text-theme-gold dark:group-focus-within:text-theme-gold transition-colors"></i>
                </div>
                <input 
                  type="email" 
                  required
                  placeholder="name@example.com"
                  class="w-full pl-10 rtl:pl-4 pr-4 rtl:pr-10 py-2.5 bg-gray-50 dark:bg-[#222] border border-gray-200 dark:border-gray-700 rounded-none text-dark-gray dark:text-white focus:outline-none focus:border-theme-gold focus:ring-1 focus:ring-theme-gold transition-all placeholder-gray-400 dark:placeholder-gray-600 text-sm"
                />
              </div>
          </div>

          <div class="group">
              <label class="block text-[10px] font-bold text-gray-500 dark:text-gray-400 uppercase tracking-widest mb-1 transition-colors group-focus-within:text-theme-gold dark:group-focus-within:text-theme-gold">
                Password
              </label>
              <div class="relative">
                <div class="absolute inset-y-0 left-0 rtl:left-auto rtl:right-0 pl-3 rtl:pl-0 rtl:pr-3 flex items-center pointer-events-none">
                  <i class="fas fa-lock text-gray-400 dark:text-gray-500 group-focus-within:text-theme-gold dark:group-focus-within:text-theme-gold transition-colors"></i>
                </div>
                <input 
                    type="password" 
                    id="password"
                    required
                    placeholder="••••••••"
                    class="w-full px-10 py-2.5 bg-gray-50 dark:bg-[#222] border border-gray-200 dark:border-gray-700 rounded-none text-dark-gray dark:text-white focus:outline-none focus:border-theme-gold focus:ring-1 focus:ring-theme-gold transition-all placeholder-gray-400 dark:placeholder-gray-600 text-sm"
                />
                <button 
                    type="button" 
                    onclick="togglePassword('password', 'toggleIcon1')"
                    class="absolute right-3 rtl:right-auto rtl:left-3 top-1/2 -translate-y-1/2 text-gray-400 dark:text-gray-500 hover:text-theme-gold dark:hover:text-theme-gold transition-colors focus:outline-none"
                >
                    <i class="far fa-eye" id="toggleIcon1"></i>
                </button>
              </div>
          </div>

          <div class="group">
              <label class="block text-[10px] font-bold text-gray-500 dark:text-gray-400 uppercase tracking-widest mb-1 transition-colors group-focus-within:text-theme-gold dark:group-focus-within:text-theme-gold">
                Confirm Password
              </label>
              <div class="relative">
                <div class="absolute inset-y-0 left-0 rtl:left-auto rtl:right-0 pl-3 rtl:pl-0 rtl:pr-3 flex items-center pointer-events-none">
                  <i class="fas fa-shield-alt text-gray-400 dark:text-gray-500 group-focus-within:text-theme-gold dark:group-focus-within:text-theme-gold transition-colors"></i>
                </div>
                <input 
                    type="password" 
                    id="confirmPassword"
                    required
                    placeholder="••••••••"
                    class="w-full px-10 py-2.5 bg-gray-50 dark:bg-[#222] border border-gray-200 dark:border-gray-700 rounded-none text-dark-gray dark:text-white focus:outline-none focus:border-theme-gold focus:ring-1 focus:ring-theme-gold transition-all placeholder-gray-400 dark:placeholder-gray-600 text-sm"
                />
                <button 
                    type="button" 
                    onclick="togglePassword('confirmPassword', 'toggleIcon2')"
                    class="absolute right-3 rtl:right-auto rtl:left-3 top-1/2 -translate-y-1/2 text-gray-400 dark:text-gray-500 hover:text-theme-gold dark:hover:text-theme-gold transition-colors focus:outline-none"
                >
                    <i class="far fa-eye" id="toggleIcon2"></i>
                </button>
              </div>
          </div>

          <div class="flex items-start text-xs pt-1">
              <label class="flex items-center cursor-pointer mt-0.5">
                <input type="checkbox" required class="w-3.5 h-3.5 rounded-sm border-gray-300 dark:border-gray-600 text-theme-gold focus:ring-theme-gold focus:ring-1 bg-gray-50 dark:bg-[#222]">
              </label>
              <span class="ml-2 rtl:ml-0 rtl:mr-2 text-gray-600 dark:text-gray-400 font-medium leading-tight text-[10px] transition-colors">
                I agree to the <a href="#" class="text-theme-gold hover:underline">Terms of Service</a> & <a href="#" class="text-theme-gold hover:underline">Privacy Policy</a>
              </span>
          </div>

          <button 
              type="submit"
              class="w-full py-3 bg-theme-gold hover:bg-theme-gold-dark text-white font-bold text-xs uppercase tracking-[0.15em] rounded-none shadow-lg hover:shadow-theme-gold/40 transform hover:-translate-y-0.5 transition-all duration-300 flex items-center justify-center gap-2 mt-2"
          >
              <span>Sign Up</span> <i class="fas fa-arrow-right"></i>
          </button>

          <div class="relative my-4">
              <div class="absolute inset-0 flex items-center">
                <div class="w-full border-t border-gray-200 dark:border-gray-700 transition-colors"></div>
              </div>
              <div class="relative flex justify-center text-[10px]">
                <span class="px-4 bg-white dark:bg-[#1a1a1a] text-gray-500 uppercase tracking-widest transition-colors">Or sign up with</span>
              </div>
          </div>

          <div class="grid grid-cols-2 gap-4">
              <button type="button" class="flex items-center justify-center px-4 py-2 border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-[#222] hover:bg-gray-100 dark:hover:bg-[#2a2a2a] transition-all group">
                <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-4 h-4 mr-2 rtl:mr-0 rtl:ml-2" alt="Google">
                <span class="text-[10px] font-bold text-gray-600 dark:text-gray-300 group-hover:text-dark-gray dark:group-hover:text-white uppercase tracking-wider transition-colors">Google</span>
              </button>

              <button type="button" class="flex items-center justify-center px-4 py-2 border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-[#222] hover:bg-gray-100 dark:hover:bg-[#2a2a2a] transition-all group">
                <i class="fab fa-facebook-f text-[#1877F2] text-sm mr-2 rtl:mr-0 rtl:ml-2"></i>
                <span class="text-[10px] font-bold text-gray-600 dark:text-gray-300 group-hover:text-dark-gray dark:group-hover:text-white uppercase tracking-wider transition-colors">Facebook</span>
              </button>
          </div>

        </form>

        <div class="mt-4 text-center relative z-10">
          <p class="text-gray-500 dark:text-gray-400 text-[11px] transition-colors">
            Already a member? 
            <a href="login.html" class="text-theme-gold font-bold hover:underline transition-colors uppercase tracking-wider ml-1">
                Sign In
            </a>
          </p>
        </div>

    </div>
  </div>

  <script>
    // Toggle Password Visibility
    function togglePassword(inputId, iconId) {
      const passwordInput = document.getElementById(inputId);
      const toggleIcon = document.getElementById(iconId);

      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        toggleIcon.classList.remove('fa-eye');
        toggleIcon.classList.add('fa-eye-slash');
      } else {
        passwordInput.type = 'password';
        toggleIcon.classList.remove('fa-eye-slash');
        toggleIcon.classList.add('fa-eye');
      }
    }

    // Handle Register Submit
    function handleRegister(event) {
      event.preventDefault();
      
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if(password !== confirmPassword) {
        alert("Passwords do not match!");
        return;
      }

      const button = event.target.querySelector('button[type="submit"]');
      const icon = button.querySelector('i.fa-arrow-right');
      const span = button.querySelector('span');
      
      if(icon) {
          icon.className = 'fas fa-circle-notch fa-spin';
      }
      span.innerText = 'CREATING ACCOUNT...';
      button.disabled = true;
      button.classList.add('opacity-80', 'cursor-not-allowed');

      setTimeout(() => {
        window.location.href = 'user-dashboard.html';
      }, 1500);
    }

    // Theme Toggle
    const themeToggle = document.getElementById('theme-toggle');
    const html = document.documentElement;

    function toggleTheme() {
      if (html.classList.contains('dark')) {
        html.classList.remove('dark');
        localStorage.setItem('theme', 'light');
      } else {
        html.classList.add('dark');
        localStorage.setItem('theme', 'dark');
      }
    }

    if (themeToggle) themeToggle.addEventListener('click', toggleTheme);
    if (localStorage.getItem('theme') === 'dark') html.classList.add('dark');

    // RTL Toggle
    const rtlToggle = document.getElementById('rtl-toggle');

    function toggleRTL() {
      if (html.getAttribute('dir') === 'rtl') {
        html.removeAttribute('dir');
        localStorage.setItem('direction', 'ltr');
      } else {
        html.setAttribute('dir', 'rtl');
        localStorage.setItem('direction', 'rtl');
      }
    }

    if (rtlToggle) rtlToggle.addEventListener('click', toggleRTL);
    if (localStorage.getItem('direction') === 'rtl') html.setAttribute('dir', 'rtl');
  </script>

</body>
</html>
