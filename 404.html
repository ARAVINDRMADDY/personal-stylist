<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found - Groww Stylist</title>
  <link rel="icon" type="image/jpeg" href="images/growwpark_logo.jpg">
  <meta name="description" content="The page you're looking for doesn't exist. Return to the Groww Stylist homepage.">
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  
  <script>
    tailwind.config = { 
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            'theme-gold': '#A68A5B',      
            'theme-gold-dark': '#8c734b', 
            'dark-gray': '#1a1a1a',       
            'light-peach': '#F5F0EB',     
            white: '#FFFFFF'
          },
          fontFamily: {
            serif: ['"Playfair Display"', 'serif'],
            sans: ['"Lato"', 'sans-serif'],
          },
          letterSpacing: {
            'widest-xl': '0.3em',
          }
        }
      }
    }
  </script>

  <style>
    [dir="rtl"] { direction: rtl; }
    
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in { animation: fadeInUp 0.8s ease-out forwards; }
    
    @keyframes float { 
      0%, 100% { transform: translateY(0px); } 
      50% { transform: translateY(-20px); } 
    }
    .animate-float { animation: float 4s ease-in-out infinite; }

    @keyframes pulse-slow {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .animate-pulse-slow { animation: pulse-slow 3s ease-in-out infinite; }
  </style>
</head>
<body class="font-sans text-gray-700 antialiased transition-colors duration-300 bg-white dark:bg-dark-gray flex flex-col min-h-screen">

  <main class="flex-grow flex items-center justify-center pt-20 relative overflow-hidden bg-white dark:bg-dark-gray transition-colors duration-300 z-10">
    
    <div class="absolute inset-0 overflow-hidden pointer-events-none z-0">
      <div class="absolute top-1/4 left-10 md:left-[20%] w-72 h-72 bg-theme-gold/10 rounded-full blur-[100px] animate-pulse-slow"></div>
      <div class="absolute bottom-1/4 right-10 md:right-[20%] w-96 h-96 bg-theme-gold/5 rounded-full blur-[120px] animate-pulse-slow" style="animation-delay: 1.5s;"></div>
    </div>

    <div class="max-w-4xl w-full text-center relative z-20 px-4 py-16">

      <div class="mb-6 animate-fade-in animate-float">
        <div class="inline-block relative">
          <div class="text-[140px] sm:text-[180px] md:text-[220px] font-serif font-bold text-transparent bg-clip-text bg-gradient-to-r from-theme-gold to-[#d4b98c] leading-none drop-shadow-sm">
            404
          </div>
        </div>
      </div>

      <div class="mb-12 animate-fade-in opacity-0" style="animation-delay: 0.2s;">
        <h2 class="text-3xl md:text-5xl font-serif font-bold text-dark-gray dark:text-white mb-4">
          Oops! This Look Is Missing.
        </h2>
        <p class="text-lg md:text-xl text-gray-600 dark:text-gray-400 max-w-2xl mx-auto leading-relaxed font-light">
          The page or article you're looking for seems to have been removed, renamed, or is currently out of season. Let's get your style journey back on track.
        </p>
      </div>

      <div class="flex flex-col sm:flex-row items-center justify-center gap-5 animate-fade-in opacity-0" style="animation-delay: 0.4s;">
        <a href="index.html" class="w-full sm:w-auto inline-flex items-center justify-center px-10 py-4 bg-theme-gold hover:bg-theme-gold-dark text-white rounded-none font-bold uppercase tracking-widest text-xs transition-all duration-300 shadow-xl hover:shadow-theme-gold/50 hover:-translate-y-1">
          <i class="fas fa-home mr-3 text-sm"></i> Back to Home
        </a>
        <a href="contact.html" class="w-full sm:w-auto inline-flex items-center justify-center px-10 py-4 bg-transparent border border-gray-300 dark:border-gray-700 hover:border-dark-gray dark:hover:border-white text-dark-gray dark:text-white rounded-none font-bold uppercase tracking-widest text-xs transition-all duration-300 shadow-sm hover:-translate-y-1">
          <i class="fas fa-envelope mr-3 text-sm"></i> Contact Stylist
        </a>
      </div>

    </div>
  </main>

  <script>
    // Theme Toggle
    const themeToggle = document.getElementById('theme-toggle');
    const mobileThemeToggle = document.getElementById('mobile-theme-toggle');
    const html = document.documentElement;

    function toggleTheme() {
      if (html.classList.contains('dark')) {
        html.classList.remove('dark');
        localStorage.setItem('theme', 'light');
      } else {
        html.classList.add('dark');
        localStorage.setItem('theme', 'dark');
      }
    }

    if (themeToggle) themeToggle.addEventListener('click', toggleTheme);
    if (mobileThemeToggle) mobileThemeToggle.addEventListener('click', toggleTheme);
    if (localStorage.getItem('theme') === 'dark') html.classList.add('dark');

    // RTL Toggle
    const rtlToggle = document.getElementById('rtl-toggle');
    const mobileRtlToggle = document.getElementById('mobile-rtl-toggle');

    function toggleRTL() {
      if (html.getAttribute('dir') === 'rtl') {
        html.removeAttribute('dir');
        localStorage.setItem('direction', 'ltr');
      } else {
        html.setAttribute('dir', 'rtl');
        localStorage.setItem('direction', 'rtl');
      }
    }

    if (rtlToggle) rtlToggle.addEventListener('click', toggleRTL);
    if (mobileRtlToggle) mobileRtlToggle.addEventListener('click', toggleRTL);
    if (localStorage.getItem('direction') === 'rtl') html.setAttribute('dir', 'rtl');

    // Mobile Menu Toggle
    const mobileMenuButton = document.getElementById('mobile-menu-button');
    const mobileMenu = document.getElementById('mobile-menu');
    const menuIcon = document.getElementById('menu-icon');
    const closeIcon = document.getElementById('close-icon');

    mobileMenuButton.addEventListener('click', () => {
      mobileMenu.classList.toggle('hidden');
      menuIcon.classList.toggle('hidden');
      closeIcon.classList.toggle('hidden');
    });

    // Mobile Dropdowns Toggle Function
    function setupMobileDropdown(dropdownId, menuId, iconId) {
      const dropdown = document.getElementById(dropdownId);
      const menu = document.getElementById(menuId);
      const icon = document.getElementById(iconId);
      
      if(dropdown && menu && icon) {
        dropdown.addEventListener('click', () => {
          menu.classList.toggle('hidden');
          icon.style.transform = menu.classList.contains('hidden') ? 'rotate(0deg)' : 'rotate(180deg)';
        });
      }
    }

    // Initialize dropdowns
    setupMobileDropdown('mobile-home-dropdown', 'mobile-home-menu', 'mobile-home-icon');
    setupMobileDropdown('mobile-dashboard-dropdown', 'mobile-dashboard-menu', 'mobile-dashboard-icon');

  </script>
</body>
</html>
